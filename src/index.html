<!DOCTYPE html>
<html>
<head>
    <title>Live Real-Scale Solar System</title>
    <style>
        body { margin: 0; background: #000; color: #eee; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #333; width: 240px; z-index: 10; }
        #stats-pane { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #00ffcc; width: 280px; display: none; z-index: 10; }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 13px; border-bottom: 1px solid #222; }
        .val { color: #00ffcc; }
        .nav-btn { width: 100%; padding: 8px; margin: 4px 0; background: #111; border: 1px solid #444; color: white; cursor: pointer; text-align: left; }
        .nav-btn:hover { background: #222; border-color: #00ffcc; }
        .control-group { margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .control-label { font-size: 11px; color: #00ffcc; margin-bottom: 5px; }
        .speed-slider { width: 100%; cursor: pointer; accent-color: #00ffcc; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0 0 10px 0; font-size:15px; color:#00ffcc;">System Navigation</h2>
        <div id="nav-list">Connecting to simulation...</div>
        
        <div class="control-group">
            <div class="control-label">Simulation Warp Speed:</div>
            <input type="range" id="speed-slider" class="speed-slider" min="1" max="86400" value="3600">
            <div style="font-size:11px; margin-top:4px; display:flex; justify-content:space-between;">
                <span>Step Size:</span>
                <span class="val" id="speed-val">1.00 hr/tick</span>
            </div>
        </div>

        <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
        <div style="font-size:10px; color:#888;">Scale: 1 Meter = 1 Unit</div>
    </div>

    <div id="stats-pane">
        <h3 id="target-name" style="margin:0 0 10px 0; color:#00ffcc;">-</h3>
        <div class="stat-row">Mass: <span class="val" id="stat-mass">-</span></div>
        <div class="stat-row">Radius: <span class="val" id="stat-rad">-</span></div>
        <div class="stat-row">Sim X: <span class="val" id="stat-x">-</span></div>
        <div class="stat-row">Sim Y: <span class="val" id="stat-y">-</span></div>
        <button onclick="focusedBody = null; document.getElementById('stats-pane').style.display='none'" style="width:100%; margin-top:10px; cursor:pointer; background:#222; color:#fff; border:1px solid #555;">Clear Focus</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const DIST_SCALE = 1.0; 
        let scene, camera, renderer, controls, bodies = [];
        let focusedBody = null;
        let lastBodyPosition = new THREE.Vector3(); // Used to track and neutralize displacement drift
        let starGroup;
        let simStepSize = 3600; // Shared timestep sync multiplier

        function getSpectralColor(temp) {
            if (temp >= 33000) return 0x9bb0ff; 
            if (temp >= 10000) return 0xaabfff; 
            if (temp >= 7300)  return 0xf8f7ff; 
            if (temp >= 6000)  return 0xfff4ea; 
            if (temp >= 5300)  return 0xffe4a0; 
            if (temp >= 3900)  return 0xffb46b; 
            return 0xff7b5a;                    
        }

        async function init() {
            scene = new THREE.Scene();
            
            renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1e6, 1e16);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            camera.position.set(0, 2e9, 4e9);

            // Hook up UI interactive elements
            // Hook up UI interactive elements
const slider = document.getElementById('speed-slider');
slider.addEventListener('input', async (e) => {
    simStepSize = parseFloat(e.target.value);
    let displayVal = simStepSize + " sec";
    if(simStepSize >= 3600) displayVal = (simStepSize / 3600).toFixed(2) + " hr";
    if(simStepSize >= 86400) displayVal = (simStepSize / 86400).toFixed(2) + " days";
    document.getElementById('speed-val').innerText = displayVal + "/tick";

    // Inform the backend python script about the updated step size configuration
    try {
        await fetch(`/set_timestep?dt=${simStepSize}`);
    } catch(err) { console.error("Failed to sync warp speed to backend:", err); }
});

            starGroup = new THREE.Group();
            starGroup.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            scene.add(starGroup);

            const starGeo = new THREE.BufferGeometry();
            const starPositions = [];
            const starCount = 6000;
            const shellRadius = 5e13; 

            for(let i = 0; i < starCount; i++) {
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                
                starPositions.push(
                    shellRadius * Math.sin(phi) * Math.cos(theta),
                    shellRadius * Math.sin(phi) * Math.sin(theta),
                    shellRadius * Math.cos(phi)
                );
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1.0, sizeAttenuation: false, transparent: true, opacity: 0.4 });
            const starPoints = new THREE.Points(starGeo, starMaterial);
            starGroup.add(starPoints);

            scene.add(new THREE.AmbientLight(0x0a0a0a));

            await loadMetadata();
            requestAnimationFrame(renderLoop);
            setInterval(pollLiveUpdate, 16);
        }

        async function loadMetadata() {
            try {
                const res = await fetch('metadata.txt?t=' + Date.now());
                const text = await res.text();
                const items = text.split('|').filter(x => x.trim().length > 0);
                
                document.getElementById('nav-list').innerHTML = '';
                bodies = [];

                items.forEach((m, i) => {
                    const parts = m.split(',');
                    const type = parts[0];
                    const name = parts[1];
                    const r = parseFloat(parts[2]) * DIST_SCALE;
                    const mass = parts[3];
                    const temperature = parseFloat(parts[4]);
                    const luminosity = parts[5] ? parseFloat(parts[5]) : 0.0;

                    const color = type === "STAR" ? getSpectralColor(temperature) : 0x3498db;
                    const geo = new THREE.SphereGeometry(r, 32, 32);
                    
                    const mat = new THREE.MeshBasicMaterial({ color: color });
                    const mesh = new THREE.Mesh(geo, mat);
                    
                    // Increased trail storage limit to 50,000 elements for ultra-long retention
                    const trailMaterial = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
                    const trail = new THREE.Line(new THREE.BufferGeometry(), trailMaterial);
                    
                    let bodyLight = null;
                    if(type === "STAR" && luminosity > 0) {
                        const calibratedIntensity = luminosity * 1e-4; 
                        bodyLight = new THREE.PointLight(color, calibratedIntensity, 0, 2);
                        scene.add(bodyLight);
                    }

                    const bodyObj = { name, radius: parts[2], mass, type, mesh, trail, light: bodyLight, history: [] };
                    bodies.push(bodyObj);
                    scene.add(mesh);
                    scene.add(trail);

                    const btn = document.createElement('button');
                    btn.className = 'nav-btn';
                    btn.innerText = "Select " + name; // Stripped out unrendered emoji characters
                    btn.onclick = () => { 
                        focusedBody = bodyObj; 
                        lastBodyPosition.copy(mesh.position); // Snap initialization anchor
                        document.getElementById('stats-pane').style.display = 'block';
                        
                        const zoomDistance = r * 8;
                        camera.position.copy(mesh.position).add(new THREE.Vector3(zoomDistance, zoomDistance * 0.4, zoomDistance));
                        controls.target.copy(mesh.position);
                    };
                    document.getElementById('nav-list').appendChild(btn);
                });
            } catch(e) { setTimeout(loadMetadata, 1000); }
        }

        async function pollLiveUpdate() {
            try {
                // Send current client speed slider configuration up to the python coordinator hook
                const res = await fetch(`live.txt?dt=${simStepSize}&t=` + Date.now());
                const text = await res.text();
                const parts = text.split('|');
                
                parts.slice(0, -1).forEach((coords, i) => {
                    if(!bodies[i]) return;
                    const [x, y, z] = coords.trim().split(/\s+/).map(n => parseFloat(n) * DIST_SCALE);
                    
                    bodies[i].mesh.position.set(x, y, z);
                    if(bodies[i].light) bodies[i].light.position.set(x, y, z);

                    bodies[i].history.push(new THREE.Vector3(x, y, z));
                    if(bodies[i].history.length > 50000) bodies[i].history.shift(); // Extended memory buffer
                    bodies[i].trail.geometry.setFromPoints(bodies[i].history);
                });

                if(focusedBody) {
                    // Update stats panel strings safely
                    document.getElementById('target-name').innerText = focusedBody.name;
                    document.getElementById('stat-mass').innerText = Number(focusedBody.mass).toExponential(3) + " kg";
                    document.getElementById('stat-rad').innerText = Math.round(focusedBody.radius / 1000).toLocaleString() + " km";
                    document.getElementById('stat-x').innerText = (focusedBody.mesh.position.x / DIST_SCALE).toExponential(2);
                    document.getElementById('stat-y').innerText = (focusedBody.mesh.position.y / DIST_SCALE).toExponential(2);
                }
            } catch(e) {}
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            
            if (camera && starGroup) {
                starGroup.position.copy(camera.position);
            }
            
            // TRACKING RESOLUTION: Active Camera Lock Mechanism
            if (focusedBody && controls) {
                const currentPos = focusedBody.mesh.position;
                // Measure vector difference between last frame and this frame
                const delta = new THREE.Vector3().subVectors(currentPos, lastBodyPosition);
                
                // Shift both camera and control anchor forward by the exact displacement vector
                camera.position.add(delta);
                controls.target.add(delta);
                
                // Store position state for next loop execution
                lastBodyPosition.copy(currentPos);
            }
            
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
